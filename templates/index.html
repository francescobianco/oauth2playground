<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OAuth2 Playground</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f5;color:#1a1a2e;padding:40px 20px}
.wrap{max-width:640px;margin:0 auto}
h1{font-size:28px;margin-bottom:4px}
.sub{color:#666;font-size:14px;margin-bottom:24px}
.card{background:#fff;border-radius:12px;padding:28px;box-shadow:0 1px 3px rgba(0,0,0,.1)}
label{display:block;font-size:13px;font-weight:600;color:#555;margin-top:16px}
label:first-child{margin-top:0}
input{display:block;width:100%;padding:10px 12px;margin-top:6px;border:1px solid #ddd;border-radius:6px;font-size:14px;background:#fafafa}
input:focus{border-color:#4a6cf7;outline:none;box-shadow:0 0 0 3px rgba(74,108,247,.15);background:#fff}
.hint{font-size:12px;color:#999;margin-top:4px}
.btn{display:inline-block;margin-top:20px;padding:12px 32px;background:#4a6cf7;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer}
.btn:hover{background:#3b5de7}
</style>
</head>
<body>
<div class="wrap">
<h1>&#9670; OAuth2 Playground</h1>
<p class="sub">Test OAuth2 flows with any provider &middot; v` + "`" + `version` + "`" + `</p>
<div class="card">
<form action="/api/sessions" method="POST">
<label>Provider name</label>
<input type="text" name="name" placeholder="google, github, facebook, ..." value="default" required>

<label>Authorization URL</label>
<input type="url" name="auth_url" placeholder="https://accounts.google.com/o/oauth2/v2/auth" required>

<label>Token URL</label>
<input type="url" name="token_url" placeholder="https://oauth2.googleapis.com/token" required>

<label>Client ID</label>
<input type="text" name="client_id" required>

<label>Client Secret</label>
<input type="password" name="client_secret" required>

<label>Scopes</label>
<input type="text" name="scopes" placeholder="openid email profile">
<div class="hint">space or comma separated</div>

<label>Redirect URI</label>
<input type="url" name="redirect_uri" placeholder="http://localhost:8080" value="http://localhost:8080">
<div class="hint">must match your OAuth2 app registration</div>

<button class="btn" type="submit">Create Session</button>
</form>
</div>
</div>
</body>
</html>
